<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAT247 · sayoLabs</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/doeeoa5f1/image/upload/v1775067108/r3tr9cpfwksqhp2pnnai.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            height: 100vh;
            overflow: hidden;
            background-image: repeating-linear-gradient(rgba(0, 255, 255, 0.02) 0px, rgba(0, 255, 255, 0.02) 1px, transparent 1px, transparent 48px);
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: rgba(0, 0, 0, 0.92);
        }

        /* Top bar – sleek single line */
        .top-bar {
            background: #050708;
            border-bottom: 1px solid rgba(0, 180, 210, 0.45);
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-height: 52px;
        }

        .brand-micro {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 1px;
            background: rgba(0, 180, 210, 0.12);
            padding: 3px 6px;
            border-left: 2px solid #00b8d4;
            color: #ccf4ff;
            white-space: nowrap;
        }
        .brand-micro span { color: #00d4ff; }

        /* Node info group – all in one row */
        .node-status-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.55);
            padding: 4px 10px;
            border-radius: 6px;
            border-left: none;
            flex-wrap: wrap;
        }
        .node-line {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .node-label-light {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #96c7d4;
        }
        .node-code-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 0.75rem;
            background: #0c0f12;
            padding: 2px 6px;
            letter-spacing: 1px;
            color: #8aeaff;
            border: 0.5px solid rgba(0, 200, 230, 0.6);
        }
        .icon-subtle {
            background: transparent;
            border: none;
            color: #80d4e6;
            font-size: 0.7rem;
            width: 26px;
            height: 26px;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .stats-line {
            display: flex;
            gap: 12px;
            font-size: 0.6rem;
            color: #9eb3ba;
        }
        .stats-line i { font-size: 0.65rem; margin-right: 3px; color: #6dbbc9; }
        .stat-digit { color: #bbefff; font-weight: 500; margin-left: 2px; }

        /* Disconnect button – always icon + optional text */
        .disconnect-btn {
            background: transparent;
            border: 1px solid #ff7b6e;
            color: #ff9f8f;
            padding: 5px 10px;
            font-family: monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .disconnect-btn i {
            font-size: 0.85rem;
        }
        /* On very small screens, hide text */
        @media (max-width: 550px) {
            .disconnect-btn .btn-text {
                display: none;
            }
            .disconnect-btn {
                padding: 5px 8px;
            }
            .node-status-area {
                gap: 8px;
                padding: 3px 8px;
            }
            .stats-line {
                gap: 8px;
            }
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            scrollbar-width: thin;
        }

        /* Onboarding panel */
        .onboarding-panel {
            max-width: 460px;
            margin: 5vh auto;
            background: rgba(8, 10, 12, 0.92);
            border: 1px solid rgba(0, 180, 210, 0.45);
            padding: 28px 20px;
        }
        .section-head {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #2fc7e0;
            text-transform: uppercase;
            border-left: 2px solid #00b8d4;
            padding-left: 10px;
            margin-bottom: 1.2rem;
        }
        .btn-primary {
            background: #00b8d4;
            border: none;
            color: #000;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            height: 48px;
            width: 100%;
            cursor: pointer;
            font-family: monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            border-radius: 2px;
        }
        .btn-primary:active { background: #2ad4f0; transform: scale(0.98); }
        .terminal-input {
            width: 100%;
            height: 48px;
            background: #07090b;
            border: 1px solid rgba(0, 180, 210, 0.6);
            color: #ddf4ff;
            font-family: monospace;
            text-align: center;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin: 0.8rem 0;
        }
        .terminal-input:focus { border-color: #2ad4f0; outline: none; }
        .divider-light {
            display: flex;
            align-items: center;
            color: #3f6c78;
            margin: 1rem 0;
            font-size: 0.7rem;
        }
        .divider-light::before,
        .divider-light::after {
            content: '';
            flex: 1;
            border-bottom: 0.5px solid rgba(0, 180, 210, 0.4);
        }
        .divider-light span { padding: 0 12px; }

        .waiting-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            gap: 1.2rem;
        }
        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #2ad4f0;
            border-radius: 50%;
            animation: softPulse 1.2s infinite ease-out;
        }
        @keyframes softPulse {
            0% { opacity: 0.4; transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0,200,230,0.3);}
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 0 6px rgba(0,200,230,0);}
        }
        .await-heading {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 0.5px solid #2ad4f0;
            background: #030608;
            padding: 6px 20px;
            color: #b4f0ff;
        }
        .waiting-code-card {
            background: #030507;
            padding: 12px 16px;
            border: 1px solid rgba(0, 180, 210, 0.6);
            margin: 12px 0;
        }
        .waiting-code-number {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: #7ee6ff;
            background: #0a0f12;
            padding: 4px 10px;
            font-family: monospace;
        }
        .copy-waiting-link {
            background: transparent;
            border: 1px solid #2ad4f0;
            color: #9edcec;
            padding: 6px 16px;
            font-size: 0.65rem;
            margin-top: 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Chat area */
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .secure-tag {
            align-self: center;
            background: rgba(0, 30, 35, 0.7);
            padding: 3px 12px;
            font-size: 0.55rem;
            letter-spacing: 1px;
            color: #7ad4e6;
            border-radius: 20px;
            margin-bottom: 12px;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            background: #020304;
            border: 1px solid rgba(0, 180, 210, 0.2);
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
        }
        .message-item {
            margin-bottom: 1rem;
        }
        .msg-meta {
            font-size: 0.55rem;
            color: #5fb0c0;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .msg-body {
            background: #0d1215;
            padding: 5px 10px;
            border-left: 2px solid #2ad4f0;
            color: #e3f0f5;
            font-size: 0.75rem;
            max-width: 88%;
            word-break: break-word;
        }
        .message-item.own .msg-body {
            border-left-color: #f0b27a;
            background: #151e22;
        }
        /* Image placeholder */
        .image-placeholder {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #0a1217;
            border-radius: 6px;
            width: 200px;
            height: 150px;
            color: #6dbbc9;
            font-size: 0.7rem;
            gap: 8px;
        }
        .image-placeholder i {
            font-size: 1.5rem;
        }
        .msg-image {
            max-width: 250px;
            max-height: 250px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 5px;
            border: 1px solid rgba(0, 180, 210, 0.3);
        }
        .bottom-bar {
            background: #07090c;
            border-top: 1px solid rgba(0, 180, 210, 0.5);
            padding: 8px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-group {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .chat-input-field {
            flex: 1;
            background: #0b0f12;
            border: 1px solid rgba(0, 180, 210, 0.5);
            height: 44px;
            padding: 0 12px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #eef5f8;
        }
        .chat-input-field:focus { border-color: #2ad4f0; outline: none; }
        .image-attach-btn {
            background: #1a2a30;
            border: 1px solid #2ad4f0;
            color: #7ee6ff;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .image-attach-btn:active { background: #2ad4f0; color: #000; }
        .send-action {
            width: 48px;
            height: 44px;
            background: #00b8d4;
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .send-action:active { background: #2ad4f0; }
        .send-action:disabled, .chat-input-field:disabled, .image-attach-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 3px; background: #111; }
        ::-webkit-scrollbar-thumb { background: #2ad4f0; }
        button { cursor: pointer; touch-action: manipulation; }
        .msg-sending-indicator {
            opacity: 0.6;
            font-style: italic;
            font-size: 0.6rem;
            margin-left: 6px;
        }
        /* Image modal */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }
        .loader-spinner {
            font-size: 2.5rem;
            color: #2ad4f0;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <div class="top-bar">
        <div class="brand-micro"><span>CHAT</span>247</div>
        <div id="nodeStatusArea" class="node-status-area hidden">
            <div class="node-line">
                <span class="node-label-light">NODE :</span>
                <span id="activeNodeCodeDisplay" class="node-code-value">——</span>
                <button id="copyNodeCodeBtn" class="icon-subtle" title="copy code"><i class="fas fa-copy"></i></button>
            </div>
            <div class="stats-line">
                <span><i class="far fa-clock"></i> <span id="timerDisplay" class="stat-digit">--:--</span></span>
                <span><i class="fas fa-user-friends"></i> <span id="usersDisplay" class="stat-digit">0</span>/100</span>
            </div>
        </div>
        <button id="globalDisconnectBtn" class="disconnect-btn"><i class="fas fa-power-off"></i> <span class="btn-text">DISCONNECT</span></button>
    </div>

    <div class="main-content" id="mainContent">
        <div id="joinCreateView" class="onboarding-panel">
            <div class="section-head"><i class="fas fa-cog fa-fw"></i> INITIATE SESSION</div>
            <button id="createRoomBtn" class="btn-primary"><i class="fas fa-plus"></i> CREATE ROOM</button>
            <div class="divider-light"><span>OR CONNECT</span></div>
            <div class="section-head"><i class="fas fa-key"></i> ACCESS NODE</div>
            <input type="text" id="roomCodeInput" class="terminal-input" placeholder="e.g. 8XK7F2M9" autocomplete="off">
            <button id="joinRoomBtn" class="btn-primary" disabled><i class="fas fa-sign-in-alt"></i> JOIN ROOM</button>
        </div>

        <div id="waitingView" class="waiting-container hidden">
            <div class="pulse-dot"></div>
            <div class="await-heading"><i class="fas fa-waveform"></i> AWAITING CONNECTION</div>
            <div class="waiting-code-card">
                <div style="font-size:0.65rem; color:#6f9fad;">NODE ACCESS CODE</div>
                <div id="waitingCodeSpan" class="waiting-code-number">——</div>
                <div class="instruction-text">Provide node access code to the second party.</div>
                <button id="waitingCopyLinkBtn" class="copy-waiting-link"><i class="fas fa-link"></i> COPY INVITE LINK</button>
            </div>
        </div>

        <div id="chatView" class="chat-area hidden">
            <div class="secure-tag"><i class="fas fa-shield-alt"></i> CHANNEL ACTIVE · INSTANT MIRROR · IMAGES SUPPORTED</div>
            <div class="messages-container" id="messagesContainer"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="input-group">
            <input type="text" id="messageInputField" class="chat-input-field" placeholder="ENTER MESSAGE" autocomplete="off" disabled>
            <button id="imageAttachBtn" class="image-attach-btn" disabled><i class="fas fa-image"></i></button>
            <input type="file" id="imageFileInput" accept="image/jpeg,image/png,image/gif,image/webp" style="display: none;">
        </div>
        <button id="sendMsgBtn" class="send-action" disabled><i class="fas fa-arrow-up"></i></button>
    </div>
</div>

<script>
    // ---------- FULL FEATURE: TEXT + IMAGES WITH LAZY LOADING ----------
    let userId = null;
    let currentRoomCode = null;
    let eventSource = null;
    let keepAliveInterval = null;
    let roomPollInterval = null;
    let countdownInterval = null;
    let currentExpiresAt = null;

    // Track pending messages to avoid duplicates
    let sentMessagesCache = new Map();
    let messageCounter = 0;

    // DOM refs
    const joinCreateView = document.getElementById('joinCreateView');
    const waitingView = document.getElementById('waitingView');
    const chatView = document.getElementById('chatView');
    const createRoomBtn = document.getElementById('createRoomBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const roomCodeInput = document.getElementById('roomCodeInput');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInputField');
    const sendMsgBtn = document.getElementById('sendMsgBtn');
    const imageAttachBtn = document.getElementById('imageAttachBtn');
    const imageFileInput = document.getElementById('imageFileInput');
    const waitingCodeSpan = document.getElementById('waitingCodeSpan');
    const waitingCopyLinkBtn = document.getElementById('waitingCopyLinkBtn');
    const nodeStatusArea = document.getElementById('nodeStatusArea');
    const activeNodeCodeDisplay = document.getElementById('activeNodeCodeDisplay');
    const copyNodeCodeBtn = document.getElementById('copyNodeCodeBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const usersDisplay = document.getElementById('usersDisplay');
    const globalDisconnectBtn = document.getElementById('globalDisconnectBtn');

    // Lazy loading: queue for images to load after initial render
    let lazyImageQueue = [];

    function processLazyImages() {
        if (lazyImageQueue.length === 0) return;
        // Use requestIdleCallback if available, else setTimeout
        const schedule = window.requestIdleCallback || setTimeout;
        schedule(() => {
            const imgElements = lazyImageQueue.slice();
            lazyImageQueue = [];
            imgElements.forEach(({ img, dataUrl }) => {
                img.src = dataUrl;
            });
        }, { timeout: 100 });
    }

    function scheduleLazyImage(imgElement, dataUrl) {
        lazyImageQueue.push({ img: imgElement, dataUrl: dataUrl });
        processLazyImages();
    }

    function showLoader() {
        let loader = document.getElementById('globalLoader');
        if (!loader) {
            loader = document.createElement('div');
            loader.id = 'globalLoader';
            loader.className = 'loader-overlay';
            loader.innerHTML = '<div class="loader-spinner"><i class="fas fa-circle-notch fa-spin"></i></div>';
            document.body.appendChild(loader);
        } else {
            loader.classList.remove('hidden');
        }
    }

    function hideLoader() {
        const loader = document.getElementById('globalLoader');
        if (loader) loader.classList.add('hidden');
    }

    function generateMessageId() {
        return `msg_${Date.now()}_${messageCounter++}_${Math.random().toString(36).substr(2, 6)}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }

    // Display image message with lazy loading
    function appendImageMessage(senderId, imageDataUrl, isOwn = true, tempId = null) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message-item ${isOwn ? 'own' : ''}`;
        const senderShort = isOwn ? 'YOU' : `NODE_${senderId.slice(-5)}`;

        // Create placeholder initially
        const imgPlaceholder = document.createElement('div');
        imgPlaceholder.className = 'image-placeholder';
        imgPlaceholder.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Loading...';

        const containerDiv = document.createElement('div');
        containerDiv.className = 'msg-body';
        containerDiv.appendChild(imgPlaceholder);

        msgDiv.innerHTML = `
            <div class="msg-meta"><i class="fas fa-circle-user"></i> ${escapeHtml(senderShort)} <i class="fas fa-image" style="margin-left: 8px;"></i></div>
        `;
        msgDiv.appendChild(containerDiv);

        if (tempId) msgDiv.setAttribute('data-temp', tempId);
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        // Create real image element and schedule lazy load
        const realImg = document.createElement('img');
        realImg.className = 'msg-image';
        realImg.alt = 'Shared image';
        realImg.onclick = () => viewFullImage(imageDataUrl);
        // Replace placeholder with image after loading
        realImg.onload = () => {
            containerDiv.innerHTML = '';
            containerDiv.appendChild(realImg);
        };
        // Schedule loading the actual image data
        scheduleLazyImage(realImg, imageDataUrl);
        return msgDiv;
    }

    // Display text message
    function appendTextMessage(senderId, text, isOwn = true, tempId = null) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message-item ${isOwn ? 'own' : ''}`;
        const senderShort = isOwn ? 'YOU' : `NODE_${senderId.slice(-5)}`;
        msgDiv.innerHTML = `<div class="msg-meta"><i class="fas fa-circle-user"></i> ${escapeHtml(senderShort)}</div><div class="msg-body">${escapeHtml(text)}</div>`;
        if (tempId) msgDiv.setAttribute('data-temp', tempId);
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        return msgDiv;
    }

    // Universal local message display
    function appendLocalMessage(content, isOwn = true, tempId = null, isImage = false) {
        const messageKey = `${content}_${Date.now()}`;
        sentMessagesCache.set(messageKey, {
            tempId: tempId,
            timestamp: Date.now(),
            isImage: isImage
        });
        setTimeout(() => { sentMessagesCache.delete(messageKey); }, 5000);

        if (isImage) {
            return appendImageMessage(userId, content, isOwn, tempId);
        } else {
            return appendTextMessage(userId, content, isOwn, tempId);
        }
    }

    // Display foreign message (from SSE)
    function appendForeignMessage(senderId, content, isImage = false) {
        // Check for duplicate own message
        if (senderId === userId) {
            let isDuplicate = false;
            const now = Date.now();
            for (let [key, value] of sentMessagesCache.entries()) {
                if (key.startsWith(content.substring(0, 50) + '_') && (now - value.timestamp) < 3000) {
                    isDuplicate = true;
                    break;
                }
            }
            if (isDuplicate) return;
        }

        const isOwn = (senderId === userId);
        if (isImage) {
            appendImageMessage(senderId, content, isOwn);
        } else {
            appendTextMessage(senderId, content, isOwn);
        }
    }

    // API calls
    async function apiCall(url, method = 'GET', body = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(url, options);
        if (!res.ok) { const errData = await res.json().catch(() => ({})); throw new Error(errData.error || `Request failed (${res.status})`); }
        return res.json();
    }

    async function registerUser() {
        try {
            const data = await apiCall('/register_user', 'POST');
            userId = data.user_id;
            startKeepAlive();
            return userId;
        } catch (err) { console.error(err); throw err; }
    }

    function startKeepAlive() {
        if (keepAliveInterval) clearInterval(keepAliveInterval);
        keepAliveInterval = setInterval(async () => { if (userId) try { await apiCall('/keep_alive', 'POST', { user_id: userId }); } catch(e) {} }, 4 * 60 * 1000);
    }

    function stopAllIntervals() {
        if (roomPollInterval) clearInterval(roomPollInterval);
        if (countdownInterval) clearInterval(countdownInterval);
        if (eventSource) { eventSource.close(); eventSource = null; }
    }

    function startCountdown(expiresISO) {
        if (countdownInterval) clearInterval(countdownInterval);
        const updateTimer = () => {
            if (!currentExpiresAt) { timerDisplay.innerText = '--:--'; return; }
            const diff = new Date(currentExpiresAt) - Date.now();
            if (diff <= 0) { timerDisplay.innerText = '00:00'; clearInterval(countdownInterval); disconnectAndReset('Session expired'); return; }
            const mins = Math.floor(diff / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        };
        updateTimer();
        countdownInterval = setInterval(updateTimer, 1000);
    }

    async function refreshRoomAndParticipants() {
        if (!currentRoomCode) return;
        try {
            const info = await apiCall(`/room_info/${currentRoomCode}`, 'GET');
            currentExpiresAt = info.expires_at;
            startCountdown(currentExpiresAt);
            usersDisplay.innerText = `${info.participants?.length || 0}`;
            if (!waitingView.classList.contains('hidden') && (info.participants?.length || 0) >= 2) await transitionToChatMode();
        } catch (err) { console.warn(err); }
    }

    function startRoomPolling() {
        if (roomPollInterval) clearInterval(roomPollInterval);
        roomPollInterval = setInterval(() => { if (currentRoomCode) refreshRoomAndParticipants(); }, 2000);
    }

    async function transitionToChatMode() {
        if (!chatView.classList.contains('hidden')) return;
        waitingView.classList.add('hidden');
        chatView.classList.remove('hidden');
        messageInput.disabled = false;
        sendMsgBtn.disabled = false;
        imageAttachBtn.disabled = false;
        await refreshRoomAndParticipants();
        await loadMessageHistory();
        startMessageStream(currentRoomCode);
    }

    async function loadMessageHistory() {
        if (!currentRoomCode) return;
        try {
            const data = await apiCall(`/messages/${currentRoomCode}`, 'GET');
            messagesContainer.innerHTML = '';
            if (data.messages && data.messages.length) {
                // Append messages one by one (they will be added to DOM)
                for (const msg of data.messages) {
                    const isImage = msg.message && msg.message.startsWith('data:image');
                    if (!isImage || (isImage && !sentMessagesCache.has(msg.message))) {
                        appendForeignMessage(msg.from_id, msg.message, isImage);
                    }
                }
                // After all messages are added, process lazy images if any remain
                // (they are already queued during appendImageMessage)
                processLazyImages();
            }
        } catch(e) { console.warn(e); }
    }

    function startMessageStream(roomCode) {
        if (eventSource) eventSource.close();
        const url = `/stream_messages/${roomCode}?user_id=${userId}`;
        eventSource = new EventSource(url);
        eventSource.onmessage = (ev) => {
            try {
                const msg = JSON.parse(ev.data);
                const isImage = msg.message && msg.message.startsWith('data:image');
                appendForeignMessage(msg.from_id, msg.message, isImage);
            } catch(e) {}
        };
        eventSource.onerror = () => {
            if (eventSource && eventSource.readyState === EventSource.CLOSED && currentRoomCode) {
                setTimeout(() => startMessageStream(currentRoomCode), 2800);
            }
        };
    }

    // Send text message
    async function sendTextMessage() {
        const content = messageInput.value.trim();
        if (!content || !currentRoomCode || !userId) return;

        const tempId = generateMessageId();
        appendLocalMessage(content, true, tempId, false);
        messageInput.value = '';
        messageInput.focus();

        try {
            await apiCall('/send_message', 'POST', { room_code: currentRoomCode, from_id: userId, message: content });
        } catch(err) {
            console.warn('Send error:', err);
            const lastMsg = messagesContainer.lastChild;
            if (lastMsg && lastMsg.getAttribute('data-temp') === tempId) {
                const errorSpan = document.createElement('span');
                errorSpan.className = 'msg-sending-indicator';
                errorSpan.innerHTML = ' ⚠️ retry';
                errorSpan.style.color = '#ff9966';
                lastMsg.appendChild(errorSpan);
                setTimeout(() => { if(errorSpan.parentNode) errorSpan.remove(); }, 3000);
            }
        }
    }

    // Send image
    async function sendImage(file) {
        if (!file || !currentRoomCode || !userId) return;

        if (file.size > 5 * 1024 * 1024) {
            alert('Image too large! Max 5MB');
            return;
        }

        const tempId = generateMessageId();

        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64Image = e.target.result;
            appendLocalMessage(base64Image, true, tempId, true);
            try {
                await apiCall('/send_message', 'POST', {
                    room_code: currentRoomCode,
                    from_id: userId,
                    message: base64Image
                });
            } catch(err) {
                console.warn('Image send error:', err);
                alert(`Failed to send image: ${err.message || 'Server error'}. The image was only shown locally.`);
                const lastMsg = messagesContainer.lastChild;
                if (lastMsg && lastMsg.getAttribute('data-temp') === tempId) {
                    lastMsg.remove();
                }
            }
        };
        reader.readAsDataURL(file);
    }

    function onImageSelected() {
        const file = imageFileInput.files[0];
        if (file) sendImage(file);
        imageFileInput.value = '';
    }

    async function handleCreateRoom() {
        if (!userId) try { await registerUser(); } catch(e) { alert('init failed'); return; }
        try {
            const data = await apiCall('/create_room', 'POST', { created_by: userId, max_participants: 100 });
            currentRoomCode = data.room_code;
            currentExpiresAt = data.expires_at;
            activeNodeCodeDisplay.innerText = currentRoomCode;
            nodeStatusArea.classList.remove('hidden');
            waitingCodeSpan.innerText = currentRoomCode;
            startCountdown(currentExpiresAt);
            usersDisplay.innerText = '1';
            joinCreateView.classList.add('hidden');
            waitingView.classList.remove('hidden');
            chatView.classList.add('hidden');
            messageInput.disabled = true;
            sendMsgBtn.disabled = true;
            imageAttachBtn.disabled = true;
            startRoomPolling();
            await refreshRoomAndParticipants();
        } catch(err) { alert('create error: ' + err.message); }
    }

    async function handleJoinRoom(code, showLoaderFlag = true) {
        if (!userId) {
            try {
                if (showLoaderFlag) showLoader();
                await registerUser();
                if (showLoaderFlag) hideLoader();
            } catch(e) {
                if (showLoaderFlag) hideLoader();
                alert('Registration failed');
                return;
            }
        }
        if (showLoaderFlag) showLoader();
        try {
            const joinData = await apiCall('/join_room', 'POST', { room_code: code, user_id: userId });
            if (joinData.success || joinData.message === 'Joined' || joinData.message === 'Already in room') {
                currentRoomCode = code;
                const roomInfo = await apiCall(`/room_info/${code}`, 'GET');
                currentExpiresAt = roomInfo.expires_at;
                activeNodeCodeDisplay.innerText = currentRoomCode;
                nodeStatusArea.classList.remove('hidden');
                startCountdown(currentExpiresAt);
                joinCreateView.classList.add('hidden');
                waitingView.classList.add('hidden');
                chatView.classList.remove('hidden');
                messageInput.disabled = false;
                sendMsgBtn.disabled = false;
                imageAttachBtn.disabled = false;
                await refreshRoomAndParticipants();
                await loadMessageHistory();
                startMessageStream(currentRoomCode);
                startRoomPolling();
                hideLoader();
            } else {
                throw new Error('Join failed: room might be full');
            }
        } catch(err) {
            console.error(err);
            alert('join error: ' + err.message);
            joinCreateView.classList.remove('hidden');
            waitingView.classList.add('hidden');
            chatView.classList.add('hidden');
            nodeStatusArea.classList.add('hidden');
            hideLoader();
        }
    }

    async function disconnectAndReset(optionalMsg) {
        stopAllIntervals();
        if (currentRoomCode && userId) {
            try { await fetch('/leave_room', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ room_code: currentRoomCode, user_id: userId }) }); } catch(e) {}
        }
        currentRoomCode = null;
        currentExpiresAt = null;
        sentMessagesCache.clear();

        joinCreateView.classList.remove('hidden');
        waitingView.classList.add('hidden');
        chatView.classList.add('hidden');
        nodeStatusArea.classList.add('hidden');
        activeNodeCodeDisplay.innerText = '——';
        timerDisplay.innerText = '--:--';
        usersDisplay.innerText = '0';
        messagesContainer.innerHTML = '';
        messageInput.disabled = true;
        sendMsgBtn.disabled = true;
        imageAttachBtn.disabled = true;
        messageInput.value = '';
        if (optionalMsg) alert(optionalMsg);
    }

    window.viewFullImage = function(imageUrl) {
        const modal = document.createElement('div');
        modal.className = 'image-modal';
        modal.onclick = () => modal.remove();
        const img = document.createElement('img');
        img.src = imageUrl;
        modal.appendChild(img);
        document.body.appendChild(modal);
    };

    function copyRoomCodeAction() { if (currentRoomCode) copyToClipboard(currentRoomCode, copyNodeCodeBtn); }
    function copyWaitingLinkAction() { if (currentRoomCode) copyToClipboard(getInviteUrl(currentRoomCode), waitingCopyLinkBtn); }
    function getInviteUrl(code) { return `${window.location.origin}${window.location.pathname}?code=${code}`; }
    async function copyToClipboard(text, btnElement, revertMs = 900) {
        try { await navigator.clipboard.writeText(text); const orig = btnElement.innerHTML; btnElement.innerHTML = '<i class="fas fa-check"></i>'; setTimeout(() => { btnElement.innerHTML = orig; }, revertMs); } catch(err) { alert(`Manual copy: ${text}`); }
    }
    function toggleJoinBtn() { joinRoomBtn.disabled = roomCodeInput.value.trim().length === 0; }
    async function checkAutoJoin() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code && code.length === 8 && /^[A-Z0-9]+$/.test(code)) {
            await handleJoinRoom(code, true);
            history.replaceState(null, '', window.location.pathname);
        }
    }

    // Event listeners
    createRoomBtn.addEventListener('click', async () => { if (!userId) await registerUser(); handleCreateRoom(); });
    joinRoomBtn.addEventListener('click', async () => { if (joinRoomBtn.disabled) return; let code = roomCodeInput.value.trim().toUpperCase(); if (!code) return alert('enter node code'); if (!userId) await registerUser(); handleJoinRoom(code, true); });
    sendMsgBtn.addEventListener('click', sendTextMessage);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendTextMessage(); });
    imageAttachBtn.addEventListener('click', () => imageFileInput.click());
    imageFileInput.addEventListener('change', onImageSelected);
    copyNodeCodeBtn.addEventListener('click', copyRoomCodeAction);
    waitingCopyLinkBtn.addEventListener('click', copyWaitingLinkAction);
    globalDisconnectBtn.addEventListener('click', () => disconnectAndReset('Node session ended'));
    roomCodeInput.addEventListener('input', toggleJoinBtn);
    toggleJoinBtn();

    (async () => {
        try { await registerUser(); } catch(e) { console.warn(e); }
        await checkAutoJoin();
        if (!currentRoomCode) {
            messageInput.disabled = true;
            sendMsgBtn.disabled = true;
            imageAttachBtn.disabled = true;
            nodeStatusArea.classList.add('hidden');
        }
    })();
</script>
</body>
</html>
